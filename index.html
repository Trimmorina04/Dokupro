<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DokuPro SaaS Contract Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#070b16;
  --card:rgba(255,255,255,0.06);
  --card2:rgba(255,255,255,0.1);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#3b82f6;
  --radius:16px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,Segoe UI,sans-serif;
}

body{
  background: radial-gradient(circle at top,#111827,#05060d);
  color:var(--text);
}

/* HEADER */
header{
  text-align:center;
  padding:30px 20px;
}

header h1{
  font-size:40px;
  background:linear-gradient(90deg,#fff,#9ca3af);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

header p{
  color:var(--muted);
  margin-top:8px;
}

/* LAYOUT */
.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
  background:var(--card2);
}

/* FORM */
label{
  font-size:12px;
  color:var(--muted);
  margin-top:10px;
  display:block;
}

input,select,textarea{
  width:100%;
  margin-top:6px;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
  transition:0.2s;
}

input:focus,textarea:focus{
  background:rgba(255,255,255,0.14);
  transform:scale(1.01);
}

/* CHECKBOXES */
.checkbox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  font-size:14px;
  color:#d1d5db;
}

.checkbox input{
  width:16px;
  height:16px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:13px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.primary{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
}

.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(59,130,246,0.4);
}

/* PREVIEW */
.preview{
  background:white;
  color:black;
  padding:50px;
  border-radius:16px;
  min-height:800px;
  animation:fade 0.4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:1000px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <h1>DokuPro</h1>
  <p>Modern Contract Builder • SaaS Level UI • PDF Generator</p>
</header>

<div class="container">
<div class="grid">

<!-- FORM -->
<div class="card">

  <label>Party 1</label>
  <input id="p1">

  <label>Party 2</label>
  <input id="p2">

  <label>Contract Type</label>
  <select id="type">
    <option>Employment</option>
    <option>Rental</option>
    <option>Service</option>
  </select>

  <label>Start Date</label>
  <input type="date" id="date">

  <label>Duration</label>
  <input id="duration">

  <label>Payment (€)</label>
  <input id="payment">

  <!-- OPTIONAL CLAUSES -->
  <div class="checkbox">
    <input type="checkbox" id="confidentiality">
    <label>Confidentiality Clause</label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="termination">
    <label>Termination Clause</label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="liability">
    <label>Liability Clause</label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="governing">
    <label>Governing Law Clause</label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="extra">
    <label>Additional Terms Section</label>
  </div>

  <button class="primary" onclick="generate()">Generate Contract</button>
  <button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview">
  <h2>Contract Preview</h2>
</div>

</div>
</div>

<script>
let text="";
let id="CTR-"+Date.now();

function generate(){

const p1=document.getElementById("p1").value;
const p2=document.getElementById("p2").value;
const payment=document.getElementById("payment").value;
const date=document.getElementById("date").value;
const duration=document.getElementById("duration").value;

let contract=`<h2>CONTRACT AGREEMENT</h2>
<p><b>${p1}</b> and <b>${p2}</b></p>
<p>Date: ${date}</p>
<p>Duration: ${duration}</p>
<p>Payment: €${payment}</p>`;

if(document.getElementById("confidentiality").checked){
contract+=`<hr><p><b>Confidentiality:</b> Both parties agree to maintain strict confidentiality regarding all business information, data, documents, pricing, strategies, and any other sensitive material shared during the course of this agreement. Neither party shall disclose, share, publish, or use such information for any purpose outside the scope of this contract without prior written consent. This obligation remains valid during and after termination of the agreement.</p>`;
}

if(document.getElementById("termination").checked){
contract+=`<hr><p><b>Termination:</b> This agreement may be terminated by either party with written notice as specified in the contract terms. Immediate termination may occur in the event of a material breach, violation of obligations, fraud, or unlawful activity. Upon termination, both parties must settle all outstanding obligations, return confidential materials, and cease all use of shared resources or intellectual property related to this agreement.</p>`;
}

if(document.getElementById("liability").checked){
contract+=`<hr><p><b>Liability:</b> Neither party shall be held liable for any indirect, incidental, special, or consequential damages arising from the performance or failure to perform under this agreement. Each party assumes responsibility for its own actions and obligations. Liability shall be limited to the total amount paid under this contract, unless otherwise required by applicable law or proven gross negligence or intentional misconduct.</p>`;
}

if(document.getElementById("governing").checked){
contract+=`<hr><p><b>Governing Law:</b> This agreement shall be governed and interpreted in accordance with the laws and legal regulations of the jurisdiction agreed upon by both parties. Any disputes arising from or related to this contract shall be resolved under the applicable courts or arbitration systems within that jurisdiction. Both parties agree to submit to the legal authority of the selected governing region.</p>`;
}

if(document.getElementById("extra").checked){
contract+=`<hr><p><b>Additional Terms:</b>Any additional terms, modifications, or special conditions agreed upon by both parties shall be considered part of this contract when documented in writing. Verbal agreements shall not be considered legally binding unless confirmed in written form. Both parties agree that this section may include custom conditions related to payments, delivery, timelines, or responsibilities specific to the nature of this agreement.</p>`;
}

document.getElementById("preview").innerHTML=contract;

text=document.getElementById("preview").innerText;
}

function downloadPDF(){

const {jsPDF}=window.jspdf;
const doc=new jsPDF();

doc.setFont("times");
doc.setFontSize(16);
doc.text("Contract Document",105,20,null,null,"center");

doc.setFontSize(11);
doc.text(doc.splitTextToSize(text,170),20,35);

doc.save(id+".pdf");
}
</script>

</body>
</html>
